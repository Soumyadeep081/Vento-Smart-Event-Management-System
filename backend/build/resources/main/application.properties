spring.application.name=vento-backend

# ===================== SERVER =====================
server.port=8080

# ===================== DATABASE =====================
# MySQL Configuration (update credentials before running)
spring.datasource.url=jdbc:mysql://localhost:3306/vento_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Soumy@62076
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===================== JWT =====================
jwt.secret=VentoSecretKeyForJWTAuthenticationVentoSecretKeyForJWTAuthentication2025
jwt.expiration=86400000

# ===================== CORS =====================
cors.allowed-origins=http://localhost:5173

# ===================== RECOMMENDATION WEIGHTS =====================
recommendation.weight.rating=0.4
recommendation.weight.budget=0.35
recommendation.weight.availability=0.25

# ===================== VENDOR COMPARISON WEIGHTS =====================
comparison.weight.rating=0.3
comparison.weight.cost=0.25
comparison.weight.experience=0.2
comparison.weight.proximity=0.15
comparison.weight.availability=0.1

# ===================== SPRINGDOC / SWAGGER =====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===================== MAIL (Optional) =====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
